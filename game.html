<div style="text-align: center; font-family: monospace;">
    <canvas id="gameCanvas" style="background: #2a1015; border: 4px solid #b8a265; box-shadow: 0 0 20px #ff3333;"></canvas>
    <div id="status" style="color: #d1c292; font-size: 22px; margin-top: 15px; height: 35px; font-weight: bold;"></div>
    <button id="retryBtn" style="background: #110002; color: #d1c292; border: 2px solid #b8a265; padding: 10px 25px; font-size: 18px; font-family: monospace; cursor: pointer; margin-top: 10px; border-radius: 4px; box-shadow: 0 0 10px #ff0000;">
        SYSTEM REBOOT (再生・再挑戦)
    </button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const statusDiv = document.getElementById("status");
const retryBtn = document.getElementById("retryBtn");

canvas.width = 600;
canvas.height = 540;

let animationId;
let audioCtx = null;
let gameActive = false;
let paddleHeight = 12;
let paddleWidth = 110;
let paddleX;
let rightPressed = false;
let leftPressed = false;
let ballRadius = 6;
let x, y, dx, dy;
let ballHistory = [];

const centerX = canvas.width / 2;
const centerY = canvas.height / 2 + 30;

// ブロックとコア（丸い中央ブロック）の設定
let bricks = [];
let rotationAngle = 0;
const rotationSpeed = 0.015; // 周りの回転速度

// 中央の丸いボスブロックのステータス
const coreRadius = 35;
let coreHP = 22; // ★22回当てないと壊れない

// タイマー設定
let startTime;
const timeLimit = 60;
let timeLeft = timeLimit;

function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === "paddle") {
        osc.type = "sine"; osc.frequency.setValueAtTime(500, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.08);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
        osc.start(now); osc.stop(now + 0.08);
    } else if (type === "brick") {
        osc.type = "square"; osc.frequency.setValueAtTime(1000, now);
        osc.frequency.setValueAtTime(800, now + 0.05); // 障害物は少し鈍い音
        gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
        osc.start(now); osc.stop(now + 0.08);
    } else if (type === "core_hit") {
        osc.type = "triangle"; osc.frequency.setValueAtTime(800, now); // コア命中音
        osc.frequency.exponentialRampToValueAtTime(1500, now + 0.1);
        gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === "gameover") {
        osc.type = "sawtooth"; osc.frequency.setValueAtTime(180, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.8);
        gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
        osc.start(now); osc.stop(now + 0.8);
    } else if (type === "start") {
        osc.type = "triangle"; osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    }
}

if (!window.keyEventsRegistered) {
    document.addEventListener("keydown", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
    }, false);
    document.addEventListener("keyup", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
    }, false);
    window.keyEventsRegistered = true;
}

function initGame() {
    if (animationId) cancelAnimationFrame(animationId);
    playSound("start");

    paddleX = (canvas.width - paddleWidth) / 2;
    x = canvas.width / 2;
    y = canvas.height - 50;
    dx = 4;
    dy = -5;
    ballHistory = [];
    rotationAngle = 0;
    gameActive = true;
    startTime = Date.now();
    
    coreHP = 22; // HPリセット

    // ★周りのブロック数を少なく調整（内周4個、外周5個のみに減少）
    bricks = [];
    // 内周（半径90px, 4個の壊れない盾）
    for (let i = 0; i < 4; i++) {
        bricks.push({ angleOffset: (Math.PI * 2 / 4) * i, radius: 95, width: 50, height: 18 });
    }
    // 外周（半径145px, 5個の壊れない盾）
    for (let i = 0; i < 5; i++) {
        bricks.push({ angleOffset: (Math.PI * 2 / 5) * i, radius: 145, width: 60, height: 18 });
    }

    statusDiv.innerHTML = "";
    draw();
}

retryBtn.addEventListener("click", initGame);

function collisionDetection() {
    // 1. 真ん中の丸いブロック（コア）との当たり判定
    if (coreHP > 0) {
        let distToCore = Math.hypot(x - centerX, y - centerY);
        if (distToCore < (coreRadius + ballRadius)) {
            // 反射ベクトル計算（中心から外側へ弾き返す）
            let angle = Math.atan2(y - centerY, x - centerX);
            dx = Math.cos(angle) * 5.5;
            dy = Math.sin(angle) * 5.5;
            
            coreHP--; // ダメージ
            playSound("core_hit");

            if (coreHP <= 0) {
                gameActive = false;
                statusDiv.innerHTML = "脱出成功！セキュリティ解除！";
                statusDiv.style.color = "#00ffff";
            }
            return;
        }
    }

    # 2. 周りの回転ブロック（壊れない障害物）との当たり判定
    for (let i = 0; i < bricks.length; i++) {
        let b = bricks[i];
        let currentAngle = b.angleOffset + rotationAngle;
        let bX = centerX + Math.cos(currentAngle) * b.radius;
        let bY = centerY + Math.sin(currentAngle) * b.radius;

        let dist = Math.hypot(x - bX, y - bY);
        if (dist < (b.width / 2 + ballRadius)) {
            let angleToBall = Math.atan2(y - centerY, x - centerX);
            dx = Math.cos(angleToBall) * 5.5;
            dy = Math.sin(angleToBall) * 5.5;
            
            // ★ b.status=0 にしない（＝壊れないで跳ね返るだけ）
            playSound("brick"); 
            break;
        }
    }
}

function drawUI() {
    ctx.strokeStyle = "#b8a265";
    ctx.lineWidth = 2;
    ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
    
    ctx.fillStyle = "#d1c292";
    ctx.font = "20px monospace";
    ctx.textAlign = "left";
    ctx.fillText("⚫︎ BALL 1", 40, 45);
    
    // スコアの代わりにコアの残り耐久値を表示
    ctx.fillText("CORE HP: " + String(coreHP).padStart(2, "0"), 200, 45);
    
    ctx.textAlign = "right";
    ctx.fillText("TIMER " + timeLeft.toFixed(2), canvas.width - 40, 45);
}

function drawCore() {
    if (coreHP <= 0) return;

    // ★中央の丸いターゲットブロック
    ctx.beginPath();
    ctx.arc(centerX, centerY, coreRadius, 0, Math.PI * 2);
    // ダメージを受けると徐々に赤く光る演出
    ctx.fillStyle = "rgba(255, 50, 50, " + (0.2 + (22 - coreHP) * 0.03) + ")";
    ctx.strokeStyle = "#ff3333";
    ctx.lineWidth = 4;
    ctx.fill();
    ctx.stroke();
    ctx.closePath();

    // コアの中心点
    ctx.beginPath();
    ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.closePath();

    // 残り回数のテキスト表示
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 16px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(coreHP, centerX, centerY);
}

function drawBricks() {
    rotationAngle += rotationSpeed;

    for (let i = 0; i < bricks.length; i++) {
        let b = bricks[i];
        let currentAngle = b.angleOffset + rotationAngle;
        let bX = centerX + Math.cos(currentAngle) * b.radius;
        let bY = centerY + Math.sin(currentAngle) * b.radius;

        ctx.save();
        ctx.translate(bX, bY);
        ctx.rotate(currentAngle + Math.PI/2);

        // 壊れない盾：少し重厚感のあるゴールド/グレーの防衛壁デザイン
        ctx.beginPath();
        ctx.rect(-b.width / 2, -b.height / 2, b.width, b.height);
        ctx.fillStyle = "rgba(120, 110, 90, 0.8)";
        ctx.strokeStyle = "#b8a265";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.closePath();
        ctx.restore();
    }
}

function drawBall() {
    ballHistory.push({ x: x, y: y });
    if (ballHistory.length > 8) ballHistory.shift();

    for (let i = 0; i < ballHistory.length; i++) {
        ctx.beginPath();
        ctx.arc(ballHistory[i].x, ballHistory[i].y, ballRadius * (i / ballHistory.length), 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, " + (i / ballHistory.length) * 0.4 + ")";
        ctx.fill();
        ctx.closePath();
    }

    ctx.beginPath();
    ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
    ctx.ffffff;
    ctx.fillStyle = "#ffffff";
    ctx.fill();
    ctx.closePath();
}

function drawPaddle() {
    ctx.save();
    let grad = ctx.createLinearGradient(paddleX, canvas.height - 35, paddleX, canvas.height - 35 + paddleHeight);
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(0.5, "#aaff00");
    grad.addColorStop(1, "#66aa00");

    ctx.beginPath();
    ctx.rect(paddleX, canvas.height - 35, paddleWidth, paddleHeight);
    ctx.fillStyle = grad;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#aaff00";
    ctx.fill();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#200a0d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (gameActive) {
        let elapsed = (Date.now() - startTime) / 1000;
        timeLeft = Math.max(0, timeLimit - elapsed);
        if (timeLeft <= 0) {
            gameActive = false;
            statusDiv.innerHTML = "TIME UP：セキュリティロックが作動しました";
            statusDiv.style.color = "#ff0000";
            playSound("gameover");
        }
    }

    drawUI();
    drawCore();
    drawBricks();
    drawBall();
    drawPaddle();
    
    if (gameActive) {
        collisionDetection();

        if (x + dx > canvas.width - 25 - ballRadius || x + dx < 25 + ballRadius) dx = -dx;
        if (y + dy < 60 + ballRadius) dy = -dy;
